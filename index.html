<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bow Business Card</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <main class="card">
            <div class="glow-bg"></div>

            <header class="brand">
                <img src="./asset/bow.jpg" alt="Profile Image" class="profile-image" id="profile-image" />
                <p class="tagline">BOW</p>
                <p class="subtag">I'm BOw</p>
            </header>

            <section class="headline">
                <h1>I'M HERE TO SERVE YOU</h1>
            </section>

            <section class="actions" aria-label="Follow us">
                <div class="socials-row socials-row-main">
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/Bobowcon" aria-label="Facebook" class="icon facebook"
                        title="Facebook" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="currentColor"
                                d="M13.5 21v-7h2.3l.4-2.7h-2.7V9.6c0-.8.2-1.3 1.4-1.3H16V5.9c-.2 0-.9-.1-1.8-.1-1.8 0-3.1 1.1-3.1 3.2v2.3H9v2.7h2.1v7h2.4Z" />
                        </svg>
                    </a>

                    <!-- Instagram -->
                    <a href="https://www.instagram.com/bobowcon" aria-label="Instagram" class="icon instagram"
                        title="Instagram" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <defs>
                                <linearGradient id="igGradient" x1="0%" y1="100%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#feda75" />
                                    <stop offset="35%" stop-color="#fa7e1e" />
                                    <stop offset="65%" stop-color="#d62976" />
                                    <stop offset="100%" stop-color="#4f5bd5" />
                                </linearGradient>
                            </defs>
                            <rect x="4" y="4" width="16" height="16" rx="4.6" fill="none" stroke="url(#igGradient)"
                                stroke-width="2" />
                            <circle cx="12" cy="12" r="3.7" fill="none" stroke="url(#igGradient)" stroke-width="2" />
                            <circle cx="17" cy="7" r="1.15" fill="url(#igGradient)" />
                        </svg>
                    </a>

                    <!-- Zalo -->
                    <a href="https://zalo.me/0966821315" aria-label="Zalo" class="icon zalo" title="Zalo"
                        target="_blank" rel="noopener noreferrer">
                        <img src="./asset/Icon_of_Zalo.svg" alt="Zalo" class="zalo-icon" />
                    </a>

                    <!-- TikTok -->
                    <a href="https://www.tiktok.com/@bobowcon" aria-label="TikTok" class="icon tiktok" title="TikTok"
                        target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#25F4EE"
                                d="M14 4c.5 1.3 1.4 2.4 2.6 3.1 1 .6 2.1 1 3.3 1v2.6c-1.5 0-3-.4-4.4-1.1v5a5.3 5.3 0 1 1-5.3-5.3c.3 0 .5 0 .8.1v2.7a2.4 2.4 0 1 0 1.6 2.3V4H14Z" />
                            <path fill="#FE2C55"
                                d="M13.3 4c.5 1.3 1.4 2.4 2.6 3.1 1 .6 2.1 1 3.3 1v1.8c-1.3 0-2.5-.3-3.7-.9v5.6a5.3 5.3 0 1 1-5.3-5.3v1.9a3.2 3.2 0 1 0 2.2 3.1V4h.9Z" />
                            <path fill="#ffffff"
                                d="M14 4c.5 1.3 1.4 2.4 2.6 3.1 1 .6 2.1 1 3.3 1v1.1c-1.5 0-3-.4-4.4-1.1v6.2a4 4 0 1 1-4-4v1.2a2.6 2.6 0 1 0 1.3 2.3V4H14Z" />
                        </svg>
                    </a>

                    <!-- Discord -->
                    <a href="https://discord.gg/tT2aSRXv" aria-label="Discord" class="icon discord" title="Discord"
                        target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="currentColor"
                                d="M20.3 5.4A16.7 16.7 0 0 0 16.2 4l-.2.4a15.2 15.2 0 0 1 3.7 1.5 11.8 11.8 0 0 0-3.6-1.1 12.5 12.5 0 0 0-8.2 1.1A15 15 0 0 1 11.6 4l-.2-.4a16.7 16.7 0 0 0-4.1 1.4C4.7 8.7 4 12.2 4.2 15.7a16.9 16.9 0 0 0 5 2.5l1.1-1.8c-.6-.2-1.1-.4-1.6-.7l.4-.3c3 1.4 6.3 1.4 9.2 0l.4.3c-.5.3-1 .5-1.6.7l1.1 1.8a16.9 16.9 0 0 0 5-2.5c.3-4-.5-7.5-2.9-10.3ZM9.6 13.6c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Zm4.8 0c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Z" />
                        </svg>
                    </a>
                </div>

                <a href="https://locket.cam/bowcon" class="locket-pill" aria-label="Locket" title="Locket"
                    target="_blank" rel="noopener noreferrer">
                    <span class="locket-pill-icon">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="currentColor"
                                d="M12 20.5s-7-4.4-7-10.2C5 7.3 7 5.5 9.4 5.5c1.3 0 2.5.6 3.3 1.7.8-1.1 2-1.7 3.3-1.7C18 5.5 20 7.3 20 10.3c0 5.8-7 10.2-7 10.2Z" />
                        </svg>
                    </span>
                    <span>Locket</span>
                </a>
            </section>

            <footer class="contact-info">
                <a class="contact-card" href="mailto:hoankb4@gmail.com">
                    <span class="contact-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M3 6.8A1.8 1.8 0 0 1 4.8 5h14.4A1.8 1.8 0 0 1 21 6.8v10.4A1.8 1.8 0 0 1 19.2 19H4.8A1.8 1.8 0 0 1 3 17.2V6.8Zm1.8-.3 7.2 5 7.2-5H4.8Zm14.4 11V8.4l-6.7 4.7a1 1 0 0 1-1.1 0L4.8 8.4v9.1h14.4Z" />
                        </svg>
                    </span>
                    <span class="contact-text">hoankb4@gmail.com</span>
                </a>

                <a class="contact-card" href="tel:+84966821315">
                    <span class="contact-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M6.6 10.8a15.8 15.8 0 0 0 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.7 3.8.7.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.3.2 2.6.7 3.8.1.4 0 .8-.3 1.1l-2.2 2.2Z" />
                        </svg>
                    </span>
                    <span class="contact-text">+84 966 821 315</span>
                </a>

                <button class="qr-trigger" id="openQrBtn" type="button" aria-haspopup="dialog" aria-controls="qrModal">
                    <span class="qr-trigger-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M3 3h8v8H3V3Zm2 2v4h4V5H5Zm8-2h8v8h-8V3Zm2 2v4h4V5h-4ZM3 13h8v8H3v-8Zm2 2v4h4v-4H5Zm10-2h2v2h-2v-2Zm2 2h2v2h-2v-2Zm-2 2h2v2h-2v-2Zm4 0h2v4h-6v-2h4v-2Zm-6-4h2v2h-2v-2Z" />
                        </svg>
                    </span>
                    <span>QR thanh toán</span>
                </button>
            </footer>
        </main>
    </div>

    <div class="modal-overlay" id="qrModal" aria-hidden="true">
        <div class="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qrModalTitle">
            <button class="modal-close" id="closeQrBtn" type="button" aria-label="Đóng">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor"
                        d="M18.3 5.7a1 1 0 0 0-1.4 0L12 10.6 7.1 5.7a1 1 0 1 0-1.4 1.4l4.9 4.9-4.9 4.9a1 1 0 1 0 1.4 1.4l4.9-4.9 4.9 4.9a1 1 0 0 0 1.4-1.4L13.4 12l4.9-4.9a1 1 0 0 0 0-1.4Z" />
                </svg>
            </button>

            <h2 id="qrModalTitle">QR thanh toán</h2>

            <div class="qr-box">
                <img src="./asset/qrbank.jpg" alt="QR ngân hàng" class="qr-image" />
            </div>

            <div class="bank-info">
                <div class="bank-row">
                    <span class="bank-label">Ngân hàng</span>
                    <span class="bank-value">BIDV</span>
                </div>
                <div class="bank-row">
                    <span class="bank-label">Chủ tài khoản</span>
                    <span class="bank-value">Nguyễn Văn Hoàn </span>
                </div>
                <div class="bank-row">
                    <span class="bank-label">Số tài khoản</span>
                    <span class="bank-value" id="bankAccountNumber">4330700679</span>
                </div>
            </div>

            <button class="copy-btn" id="copyAccountBtn" type="button">
                <span class="copy-btn-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M8 7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V7Zm-4 4a2 2 0 0 1 2-2h1v8a4 4 0 0 0 4 4h5v1H8a2 2 0 0 1-2-2v-9Z" />
                    </svg>
                </span>
                <span id="copyBtnText">Copy số tài khoản</span>
            </button>
        </div>
    </div>

    <script src="./script.js">

    </script>
</body>

</html>
